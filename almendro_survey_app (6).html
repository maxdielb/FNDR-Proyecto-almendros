<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proyecto Almendros</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#16a34a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const productoresBD_Inicial = [
            { id: 1, codigo: "P001", nombreAgricola: "Agrícola Alto Primavera", productor: "Alejandro Martinez", telefono: "933961424", localidad: "Rengo", coordenadas: "-34.467152, -70.756167", supAlmendros: 93.6, progreso: 0, encuestasCuarteles: [] },
            { id: 2, codigo: "P002", nombreAgricola: "Agrícola Alicura (Ucuquer)", productor: "Agustin Ovalle", telefono: "991612820", localidad: "Litueche", coordenadas: "-34.013448, -71.690217", supAlmendros: 100.0, progreso: 0, encuestasCuarteles: [] },
            { id: 3, codigo: "P003", nombreAgricola: "Predio Olga Saavedra", productor: "Olga Saavedra", telefono: "985084614", localidad: "Bellavista", coordenadas: "-34.428115, -70.778472", supAlmendros: 1.0, progreso: 0, encuestasCuarteles: [] },
            { id: 4, codigo: "P004", nombreAgricola: "Predio Héctor Rubio", productor: "Héctor Rubio", telefono: "946670497", localidad: "Chanqueahue", coordenadas: "-34.393055, -70.786503", supAlmendros: 0.5, progreso: 0, encuestasCuarteles: [] },
            { id: 5, codigo: "P005", nombreAgricola: "Predio Miguel Ángel Banda", productor: "Miguel Ángel Banda", telefono: "912298156", localidad: "Rinconada de Malambo", coordenadas: "-34.424601, -70.833300", supAlmendros: 0.87, progreso: 0, encuestasCuarteles: [] },
            { id: 6, codigo: "P006", nombreAgricola: "Predio Tatiana Canales", productor: "Tatiana Lorena Canales", telefono: "997647373", localidad: "El Cerrillo", coordenadas: "-34.395973, -70.782422", supAlmendros: 0.25, progreso: 0, encuestasCuarteles: [] },
            { id: 7, codigo: "P007", nombreAgricola: "Predio Gloria Medina", productor: "Gloria Medina", telefono: "995397066", localidad: "Rinconada de Malambo", coordenadas: "-34.423912, -70.834487", supAlmendros: 0.11, progreso: 0, encuestasCuarteles: [] },
            { id: 8, codigo: "P008", nombreAgricola: "Predio Patricio Cartes", productor: "Patricio Cartes", telefono: "932250222", localidad: "El Cerrillo", coordenadas: "-34.393188, -70.777404", supAlmendros: 0.5, progreso: 0, encuestasCuarteles: [] },
            { id: 9, codigo: "P009", nombreAgricola: "Fundo Tunca Arriba S.A", productor: "Hugo Arros", telefono: "56996798577", localidad: "Codegua", coordenadas: "34°07'21.1S 70°38'06.4W", supAlmendros: 211.0, progreso: 0, encuestasCuarteles: [] },
            { id: 10, codigo: "P010", nombreAgricola: "Agrícola La Pandina", productor: "Ignacio Urquiza", telefono: "56992268298", localidad: "Rengo", coordenadas: "-34.429992, -70.778625", supAlmendros: 82.0, progreso: 0, encuestasCuarteles: [] },
            { id: 11, codigo: "P011", nombreAgricola: "Fundo Colihuito", productor: "Bruno Ragni", telefono: "56994493022", localidad: "Requinoa", coordenadas: "Requinoa", supAlmendros: 64.0, progreso: 0, encuestasCuarteles: [] }
        ];

        const CircularProgress = ({ progreso }) => {
            const radius = 15.9155;
            const circumference = radius * 2 * Math.PI; 
            const strokeDashoffset = circumference - (progreso / 100) * circumference;
            const colorClass = progreso === 100 ? 'text-green-600' : progreso > 0 ? 'text-orange-500' : 'text-gray-400';
            const strokeColor = progreso === 100 ? '#16a34a' : progreso > 0 ? '#f97316' : '#d1d5db';

            return (
                <div className="relative flex items-center justify-center w-14 h-14">
                    <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                        <circle cx="18" cy="18" r={radius} fill="none" className="stroke-gray-200" strokeWidth="3" />
                        <circle cx="18" cy="18" r={radius} fill="none" stroke={strokeColor} strokeWidth="3" 
                                strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} 
                                strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                    </svg>
                    <div className={`absolute text-xs font-black ${colorClass}`}>
                        {progreso}%
                    </div>
                </div>
            );
        };

        function App() {
            const [vistaActual, setVistaActual] = useState('inicio'); 
            
            // MEMORIA PERSISTENTE (Local Storage)
            const [productores, setProductores] = useState(() => {
                const guardado = localStorage.getItem('almendros_data_v1');
                if (guardado) {
                    return JSON.parse(guardado);
                }
                return productoresBD_Inicial;
            });

            // Guardar automáticamente cada vez que cambien los productores
            useEffect(() => {
                localStorage.setItem('almendros_data_v1', JSON.stringify(productores));
            }, [productores]);

            const [productorActivo, setProductorActivo] = useState(null);
            const [cuartelActivo, setCuartelActivo] = useState(null);
            const [cuarteles, setCuarteles] = useState([]);
            const [cantidadCuartelesInput, setCantidadCuartelesInput] = useState('');
            const [pestana, setPestana] = useState('info'); 
            const [notificacion, setNotificacion] = useState({ visible: false, texto: '' });
            const [modalNuevoProd, setModalNuevoProd] = useState(false);
            const [modalReinicio, setModalReinicio] = useState(false);
            
            // Valor del Dólar
            const [valorDolar, setValorDolar] = useState('');

            // ESTADOS: PESTAÑA 1 (Info & Ambientes)
            const [anoPlantacion, setAnoPlantacion] = useState('');
            const [origenPlantas, setOrigenPlantas] = useState('');
            const [especificarOrigen, setEspecificarOrigen] = useState('');
            const [serieSuelo, setSerieSuelo] = useState('');
            const [marcoX, setMarcoX] = useState('');
            const [marcoY, setMarcoY] = useState('');
            const [densidad, setDensidad] = useState(0);
            const [ambientes, setAmbientes] = useState([{ id: Date.now(), estacion: 'Invierno', temp: '', hr: '', prec: '' }]);

            // ESTADOS: PESTAÑA 2 (Plantas)
            const [variedades, setVariedades] = useState([{ id: Date.now(), nombre: '', portainjerto: '', porcentaje: '' }]);
            const [sumaVariedades, setSumaVariedades] = useState(0);

            // ESTADOS: PESTAÑA 3 (Agro & Colmenas)
            const [tipoRiego, setTipoRiego] = useState('');
            const [volumenRiego, setVolumenRiego] = useState('');
            const [frecuenciaRiego, setFrecuenciaRiego] = useState('');
            const [fuenteAgua, setFuenteAgua] = useState('');
            const [estrategiaFertilizacion, setEstrategiaFertilizacion] = useState('');
            const [metodoCosecha, setMetodoCosecha] = useState('');
            
            // Colmenas
            const [usaColmenas, setUsaColmenas] = useState('No');
            const [cantColmenas, setCantColmenas] = useState('');
            const [propiedadColmenas, setPropiedadColmenas] = useState('Arrendadas');
            const [costoColmenas, setCostoColmenas] = useState('');

            // ESTADOS: PESTAÑA 4 (Fito)
            const [aplicaciones, setAplicaciones] = useState([{
                id: Date.now(), fecha: '', estadoFeno: '', objetivo: '', producto: '', dosis: '', mojamiento: '', 
                costoUnitario: '', iva: '1', costoPorHa: 0, realizada: 'Sí', comentarios: ''
            }]);

            // ESTADOS: PESTAÑA 5 (Prod)
            const [tipoCosecha, setTipoCosecha] = useState('Cuartel');
            const [condicionRendimiento, setCondicionRendimiento] = useState('Con pelón');
            const [fechaCosechaCuartel, setFechaCosechaCuartel] = useState('');
            const [prodTotalCuartel, setProdTotalCuartel] = useState(''); 
            const [cosechaVariedades, setCosechaVariedades] = useState([{ id: Date.now(), variedad: '', produccion: '', fecha: '' }]);
            const [calibres, setCalibres] = useState([{ id: Date.now(), tipo: '', porcentaje: '' }]);
            const [sumaCalibres, setSumaCalibres] = useState(0);

            // ESTADOS: Observaciones
            const [observaciones, setObservaciones] = useState({ info: '', plantas: '', agro: '', fito: '', prod: '', econ: '' });

            // ESTADOS: PESTAÑA 6 (Econ)
            const [ventaConPelon, setVentaConPelon] = useState('No');
            const [pesoConPelon, setPesoConPelon] = useState('');
            const [ventaSinPelon, setVentaSinPelon] = useState('No');
            const [pesoSinPelon, setPesoSinPelon] = useState('');
            const [destinosVenta, setDestinosVenta] = useState([{ id: Date.now(), mercado: '', porcentaje: '', precio: '' }]);
            const [sumaDestinos, setSumaDestinos] = useState(0);
            const [notaPrecioVenta, setNotaPrecioVenta] = useState('');
            
            const [costosOperacionales, setCostosOperacionales] = useState([
                { id: 1, item: 'Petróleo / Combustible', monto: '', periodo: 'Mensual', anualCalculado: 0 },
                { id: 2, item: 'Electricidad', monto: '', periodo: 'Mensual', anualCalculado: 0 }
            ]);

            const [maquinarias, setMaquinarias] = useState([]);
            const [manoObra, setManoObra] = useState([]);

            useEffect(() => {
                if (marcoX > 0 && marcoY > 0) setDensidad(Math.round(10000 / (parseFloat(marcoX) * parseFloat(marcoY))));
                else setDensidad(0);
            }, [marcoX, marcoY]);

            useEffect(() => {
                let total = 0;
                variedades.forEach(v => { if (v.porcentaje) total += parseFloat(v.porcentaje); });
                setSumaVariedades(total);
            }, [variedades]);

            useEffect(() => {
                let total = 0;
                calibres.forEach(c => { if (c.porcentaje) total += parseFloat(c.porcentaje); });
                setSumaCalibres(total);
            }, [calibres]);

            useEffect(() => {
                let total = 0;
                destinosVenta.forEach(d => { if (d.mercado !== 'No aplica' && d.porcentaje) total += parseFloat(d.porcentaje); });
                setSumaDestinos(total);
            }, [destinosVenta]);

            // Función para reiniciar solo un productor específico
            const confirmarReinicioApp = () => {
                if (modalReinicio) {
                    setProductores(prev => prev.map(p => {
                        if(p.id === modalReinicio) {
                            return { ...p, progreso: 0, encuestasCuarteles: [] };
                        }
                        return p;
                    }));
                    setModalReinicio(false);
                }
            };

            const mostrarAutoguardado = (siguientePestana) => {
                setNotificacion({ visible: true, texto: '💾 Guardando...' });
                setProductores(prev => prev.map(p => {
                    if(p.id === productorActivo.id) {
                        let nuevoProgreso = p.progreso + 15;
                        if(nuevoProgreso > 100) nuevoProgreso = 100;
                        return { ...p, progreso: nuevoProgreso };
                    }
                    return p;
                }));
                setTimeout(() => {
                    setNotificacion({ visible: true, texto: '✅ Autoguardado exitoso' });
                    setTimeout(() => {
                        setNotificacion({ visible: false, texto: '' });
                        if(siguientePestana) setPestana(siguientePestana);
                    }, 1000);
                }, 800);
            };

            const actualizarCostosOp = (id, campo, valor) => {
                setCostosOperacionales(prev => prev.map(c => {
                    if (c.id === id) {
                        const newC = { ...c, [campo]: valor };
                        const m = parseFloat(newC.monto) || 0;
                        newC.anualCalculado = newC.periodo === 'Mensual' ? m * 12 : m;
                        return newC;
                    }
                    return c;
                }));
            };

            const agregarDestinoVenta = () => setDestinosVenta([...destinosVenta, { id: Date.now(), mercado: '', porcentaje: '', precio: '' }]);
            const actualizarDestino = (id, campo, valor) => setDestinosVenta(prev => prev.map(d => d.id === id ? { ...d, [campo]: valor } : d));

            // Fitosanitario Helpers
            const agregarAppFito = () => setAplicaciones([...aplicaciones, { id: Date.now(), fecha: '', estadoFeno: '', objetivo: '', producto: '', dosis: '', mojamiento: '', costoUnitario: '', iva: '1', costoPorHa: 0, realizada: 'Sí', comentarios: '' }]);
            const actualizarAppFito = (id, campo, valor) => {
                setAplicaciones(prev => prev.map(app => {
                    if (app.id === id) {
                        const newApp = { ...app, [campo]: valor };
                        if(['dosis', 'costoUnitario', 'iva'].includes(campo)) {
                            const dosisVal = parseFloat(newApp.dosis) || 0;
                            const costoVal = parseFloat(newApp.costoUnitario) || 0;
                            const ivaVal = parseFloat(newApp.iva) || 1;
                            newApp.costoPorHa = dosisVal * costoVal * ivaVal;
                        }
                        return newApp;
                    }
                    return app;
                }));
            };

            // Maquinaria Helpers
            const agregarMaquinaria = () => setMaquinarias([...maquinarias, { id: Date.now(), tipo: '', marca: '', propia: 'Propia', costo: '', labor: '', inversion: '', anoCompra: '' }]);
            const actualizarMaq = (id, campo, valor) => setMaquinarias(prev => prev.map(m => m.id === id ? { ...m, [campo]: valor } : m));

            // Ambientes Helpers
            const agregarAmbiente = () => setAmbientes([...ambientes, { id: Date.now(), estacion: 'Verano', temp: '', hr: '', prec: '' }]);
            const actualizarAmbiente = (id, campo, valor) => setAmbientes(prev => prev.map(a => a.id === id ? { ...a, [campo]: valor } : a));

            const exportarExcel = () => {
                const hojaGeneral = [];
                const hojaAgro = [];
                const hojaFito = [];
                const hojaProd = [];
                const hojaEcon = [];

                productores.forEach(p => {
                    const baseInfo = { "ID_Productor": p.codigo, "Agrícola": p.nombreAgricola, "Sup_Almendros_Ha": p.supAlmendros };
                    
                    if (p.encuestasCuarteles && p.encuestasCuarteles.length > 0) {
                        p.encuestasCuarteles.forEach(enc => {
                            // 1. Hoja Info y Plantas
                            hojaGeneral.push({ ...baseInfo, "Cuartel": enc.Cuartel_Evaluado, "Sup_Cuartel_Ha": enc.Sup_Cuartel_Ha, "Año_Plantacion": enc.Año_Plantacion, "Origen_Plantas": enc.Origen_Plantas, "Serie_Suelo": enc.Serie_Suelo, "Marco": enc.Marco_Plantacion, "Densidad_pl_ha": enc.Densidad_Pl_Ha, "Variedades_y_Portainjertos": enc.Variedades_Portainjertos, "Clima_Ambientes": enc.Clima_Ambientes, "Obs_Info": enc.Obs_Info, "Obs_Plantas": enc.Obs_Plantas });
                            
                            // 2. Hoja Manejo Agronómico
                            hojaAgro.push({ ...baseInfo, "Cuartel": enc.Cuartel_Evaluado, "Tipo_Riego": enc.Riego_Tipo, "Frecuencia_Riego": enc.Riego_Frecuencia, "Volumen_Riego_m3": enc.Riego_Volumen_m3, "Fuente_Agua": enc.Riego_Fuente, "Estrategia_Fertilizacion": enc.Fertilizacion, "Metodo_Cosecha": enc.Cosecha_Metodo, "Usa_Colmenas": enc.Usa_Colmenas, "Cant_Colmenas_Ha": enc.Colmenas_Cant_Ha, "Propiedad_Colmenas": enc.Colmenas_Propiedad, "Obs_Manejo": enc.Obs_Agro });

                            // 3. Hoja Fitosanitario
                            hojaFito.push({ ...baseInfo, "Cuartel": enc.Cuartel_Evaluado, "Detalle_Aplicaciones": enc.Programa_Fito_Detalle, "Obs_Fitosanitario": enc.Obs_Fito });

                            // 4. Hoja Producción
                            hojaProd.push({ ...baseInfo, "Cuartel": enc.Cuartel_Evaluado, "Condicion_Dato": enc.Condicion_Rendimiento, "Prod_Total_Cuartel_Ton": enc.Prod_Total_Cuartel_Ton, "Rendimiento_Estimado_Ton_Ha": enc.Rendimiento_Estimado_Ton_Ha, "Desglose_Rend_Variedades": enc.Desglose_Rend_Variedad, "Distribucion_Calibres": enc.Calibres_Porcentajes, "Obs_Produccion": enc.Obs_Prod });

                            // 5. Hoja Economía y Costos
                            hojaEcon.push({ ...baseInfo, "Cuartel": enc.Cuartel_Evaluado, "Valor_Dolar_USD": enc.Valor_Dolar_Referencia, "Venta_Con_Pelon": enc.Venta_Con_Pelon, "Venta_Sin_Pelon": enc.Venta_Sin_Pelon, "Destinos_y_Precios_Venta": enc.Destinos_Venta, "Detalle_Costos_Op": enc.Detalle_Costos_Op, "Detalle_Maquinaria": enc.Detalle_Maquinaria, "COSTO_Fito_CLP": enc.COSTO_Fitosanitario_CLP, "COSTO_Maq_CLP": enc.COSTO_Maquinaria_CLP, "COSTO_Operacional_CLP": enc.COSTO_Operacional_CLP, "COSTO_Polinizacion_CLP": enc.COSTO_Polinizacion_CLP, "COSTO_TOTAL_CLP": enc.COSTO_TOTAL_CLP, "INGRESO_BRUTO_CLP": enc.INGRESO_BRUTO_CLP, "MARGEN_LIQUIDO_CLP": enc.MARGEN_LIQUIDO_CLP, "Obs_Economia": enc.Obs_Econ });
                        });
                    } else {
                        // Si no hay cuarteles guardados, solo pone los datos base
                        hojaGeneral.push({ ...baseInfo, "Cuartel": "Sin registro", "Estado": "Pendiente" });
                    }
                });

                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(hojaGeneral), "1_Info_y_Plantas");
                XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(hojaAgro), "2_Manejo_Agro");
                XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(hojaFito), "3_Fitosanitario");
                XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(hojaProd), "4_Produccion");
                XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(hojaEcon), "5_Economia");

                XLSX.writeFile(workbook, "Almendro_Survey_Base_Datos_Completa.xlsx");
            };

            if (vistaActual === 'inicio') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-white p-6 relative overflow-hidden">
                        <div className="absolute top-0 w-full h-1/2 bg-green-600 rounded-b-full -translate-y-10 opacity-10"></div>
                        <div className="w-24 h-24 bg-green-600 rounded-full flex items-center justify-center mb-6 shadow-xl z-10">
                            <span className="text-5xl text-white">🌳</span>
                        </div>
                        <h1 className="text-3xl font-black text-gray-800 mb-0 tracking-tight z-10 text-center">Proyecto Almendros</h1>
                        <p className="text-lg text-gray-600 mb-1 z-10 font-bold">(Encuesta)</p>
                        <p className="text-xs text-gray-400 mb-10 text-center font-bold z-10">FRND:IDI40074455-0</p>
                        
                        <div className="w-full max-w-sm space-y-4 z-10">
                            <button onClick={() => { setVistaActual('productores'); }} className="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-transform flex items-center justify-center">
                                INICIAR ENCUESTA
                            </button>
                        </div>
                    </div>
                );
            }

            if (vistaActual === 'productores') {
                return (
                    <div className="pb-20 bg-gray-50 min-h-screen relative">
                        {modalReinicio !== false && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-fade-in">
                                    <h3 className="text-lg font-black text-red-600 mb-2">⚠️ ¿Borrar datos de este Productor?</h3>
                                    <p className="text-gray-600 text-sm mb-6">Esta acción borrará todos los datos ingresados para este productor en ESTE dispositivo. No se pueden recuperar.</p>
                                    <div className="flex gap-3">
                                        <button onClick={() => setModalReinicio(false)} className="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl active:bg-gray-200">Cancelar</button>
                                        <button onClick={confirmarReinicioApp} className="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl active:bg-red-700 shadow-md">Sí, Borrar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="bg-green-600 text-white p-5 shadow-md sticky top-0 z-10">
                            <div className="flex justify-between items-center mb-2">
                                <div>
                                    <h2 className="text-xl font-black leading-tight">Proyecto Almendros</h2>
                                    <p className="text-xs text-green-200 font-bold">FRND:IDI40074455-0</p>
                                </div>
                            </div>
                            <input type="text" placeholder="🔍 Buscar productor o localidad..." className="w-full p-3 mt-2 rounded-xl shadow-inner text-gray-800 outline-none text-sm" />
                        </div>
                        
                        <div className="p-4 space-y-3">
                            <button onClick={exportarExcel} className="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-sm shadow-md active:bg-blue-700 transition flex items-center justify-center gap-2 mb-2">
                                📥 Descargar Base de Datos a Excel
                            </button>

                            <div className="flex justify-between items-center mb-2">
                                <h3 className="font-bold text-gray-600">Lista de Productores</h3>
                                <button onClick={() => setModalNuevoProd(true)} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm">+ Agregar</button>
                            </div>

                            {productores.map(prod => (
                                <div key={prod.id} onClick={() => { setProductorActivo(prod); setVistaActual('detalleProductor'); }}
                                    className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50 transition cursor-pointer flex justify-between items-center">
                                    <div className="flex-1 pr-3">
                                        <h3 className="font-bold text-base text-gray-800 leading-tight mb-1">{prod.nombreAgricola}</h3>
                                        <p className="text-xs text-gray-500 mb-1">👤 {prod.productor}</p>
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs text-gray-500">📍 {prod.localidad}</span>

                                                "Usa_Colmenas": usaColmenas,
                                                "Colmenas_Cant_Ha": usaColmenas === 'Sí' ? cantColmenas : "N/A",
                                                "Colmenas_Propiedad": usaColmenas === 'Sí' ? propiedadColmenas : "N/A",
                                                "Obs_Agro": observaciones.agro,
                                                
                                                // FITOSANITARIO
                                                "Programa_Fito_Detalle": fitoStr,
                                                "Obs_Fito": observaciones.fito,
                                                
                                                // PRODUCCION
                                                "Condicion_Rendimiento": condicionRendimiento,
                                                "Prod_Total_Cuartel_Ton": prodTotalCuartel,
                                                "Rendimiento_Estimado_Ton_Ha": calculoRendimiento,
                                                "Desglose_Rend_Variedad": cosechaVarStr,
                                                "Calibres_Porcentajes": calibresStr,
                                                "Obs_Prod": observaciones.prod,
                                                
                                                // ECONOMIA Y MAQUINARIA
                                                "Valor_Dolar_Referencia": valorDolar,
                                                "Venta_Con_Pelon": ventaConPelon,
                                                "Venta_Sin_Pelon": ventaSinPelon,
                                                "Destinos_Venta": destinosStr,
                                                "Detalle_Costos_Op": costosOpStr,
                                                "Detalle_Maquinaria": maqStr,
                                                "Obs_Econ": observaciones.econ,
                                                
                                                // RESUMEN FINANCIERO (Cálculos Automáticos)
                                                "COSTO_Fitosanitario_CLP": costoFitoTotal,
                                                "COSTO_Maquinaria_CLP": costoMaqTotal,
                                                "COSTO_Operacional_CLP": costoEnerTotal,
                                                "COSTO_Polinizacion_CLP": costoPolTotal,
                                                "COSTO_TOTAL_CLP": totalCostos,
                                                "INGRESO_BRUTO_CLP": ingresoBruto,
                                                "MARGEN_LIQUIDO_CLP": margen
                                            };

                                            setProductores(prev => prev.map(p => {
                                                if(p.id === productorActivo.id) {
                                                    const cuartelesGuardados = p.encuestasCuarteles ? [...p.encuestasCuarteles] : [];
                                                    const idx = cuartelesGuardados.findIndex(c => c.Cuartel_Evaluado === cuartelActivo.nombre);
                                                    
                                                    if(idx >= 0) cuartelesGuardados[idx] = payload;
                                                    else cuartelesGuardados.push(payload);
                                                    
                                                    return {
                                                        ...p,
                                                        progreso: 100, 
                                                        encuestasCuarteles: cuartelesGuardados
                                                    };
                                                }
                                                return p;
                                            }));
                                            setVistaActual('productores');
                                        }} className="w-full bg-white text-gray-900 py-4 rounded-xl font-black text-base shadow-xl active:scale-95 transition">
                                            💾 Guardar Encuesta y Volver al Menú
                                        </button>
                                    </div>
                                );
                            })()}
                        </div>
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
